kind = "web"
previewPath = "/"
title = "HCI Voice Assistant"
version = "1.0.0"
id = "artifacts/hci-voice-assistant"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25210

[services.development]
run = "pnpm --filter @workspace/hci-voice-assistant run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hci-voice-assistant", "run", "build" ]
publicDir = "artifacts/hci-voice-assistant/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25210"
BASE_PATH = "/"
